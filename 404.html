<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>404 — Возникла ошибка | Reels Booster</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bad+Script&family=Inter:wght@400;500;700&family=Manrope:wght@400;500;700;800&family=Oswald:wght@500;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./404.css" />
</head>

<body>

  <main class="err-page">
    <span class="err-glow" aria-hidden="true"></span>

    <div class="container err-container">

      <div class="err-code" aria-hidden="true">404</div>

      <h1 class="err-title">Возникла ошибка</h1>

      <p class="err-text">
        К сожалению, при загрузке страницы произошла ошибка, и нужную информацию найти не удалось.
      </p>

       <a href="./index.html" class="btn btn--pink err-btn">Вернуться на главную</a>

    </div>
  </main>

  <script>
    document.querySelectorAll('[data-year]').forEach(function(el) {
      el.textContent = new Date().getFullYear();
    });
  </script>

</body>
</html>
